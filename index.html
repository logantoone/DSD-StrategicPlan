<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davis School District Strategic Plan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, 'Helvetica Neue', sans-serif; background: #fff; }

  /* ===== FEEDBACK BANNER ===== */
  .feedback-banner {
    background: #183969;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .feedback-btn {
    display: inline-block;
    background: #ffca58;
    color: #183969;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 4px;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .feedback-btn:hover { background: #f0b830; }

  /* ===== HERO ===== */
  .hero { background: #fff; padding: 28px 32px 0; text-align: center; }
